<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parre-Man</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #222; overflow: hidden; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        canvas {
            background-color: #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: none; /* Oculto hasta que empiece el juego */
        }
        #start-screen {
            text-align: center; color: white; padding: 20px;
        }
        button {
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            background-color: #ffcc00; color: #333; border: none;
            border-radius: 10px; cursor: pointer; margin-top: 20px;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: red; font-size: 40px; font-weight: bold; text-shadow: 2px 2px black;
            display: none; text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Parre-Man Chaser</h1>
        <p>Incliná tu móvil para mover la bolita azul.</p>
        <p>¡Huye de la cara!</p>
        <p>Asegúrate de que el sonido esté activado.</p>
        <button id="start-btn">Toca aquí para Empezar</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="game-over">¡TE COMIÓ!<br><button onclick="location.reload()">Reintentar</button></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');

        // Ajustar canvas al tamaño de la pantalla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Variables del juego
        let gameRunning = false;
        let lastNamTime = 0;
        let enemyImageLoaded = false;

        // Jugador (Bolita)
        const player = {
            x: canvas.width / 2, y: canvas.height / 2, radius: 15,
            vx: 0, vy: 0, speed: 0.1, friction: 0.95
        };

        // Enemigo (La Cara)
        const enemy = {
            x: 50, y: 50, radius: 45, speed: 2.5,
            mouthOpenness: 0
        };

        // Cargar la imagen de la cara
        const enemyImg = new Image();
        enemyImg.src = 'cara.jpg'; 
        enemyImg.onload = () => { enemyImageLoaded = true; };

       // Iniciar el juego con retraso dramático
        startBtn.addEventListener('click', () => {
            // Cambiamos el texto del menú mientras habla
            startScreen.innerHTML = "<h2>Escucha con atención...</h2>";
            
            // 1. Activar la voz inicial
            try {
                if ('speechSynthesis' in window) {
                    let fraseInicial = new SpeechSynthesisUtterance("pago el alquiler con garrafas de agua");
                    fraseInicial.lang = 'es-ES'; fraseInicial.rate = 1.2; fraseInicial.pitch = 1.7;
                    window.speechSynthesis.speak(fraseInicial);
                }
            } catch(e) { console.log("Error de voz", e); }

            // 2. Función para arrancar el juego después de 3 segundos (3000 milisegundos)
            const arrancarConRetraso = () => {
                setTimeout(() => {
                    startGame();
                }, 3000); // <- Aquí le damos 3 segundos de tiempo para que termine la frase
            };

            // 3. Comprobación de los sensores
            try {
                if (window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function') {
                    window.DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                            arrancarConRetraso();
                        })
                        .catch(e => {
                            arrancarConRetraso();
                        });
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    arrancarConRetraso();
                }
            } catch (error) {
                arrancarConRetraso();
            }
        });

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            
            // Reajustar tamaño por si ha cambiado al quitar la pantalla de inicio
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        // Manejar la inclinación del móvil
        function handleOrientation(event) {
            if (!gameRunning) return;
            
            let tiltX = event.gamma;
            let tiltY = event.beta;

            if (tiltX > 90) tiltX = 90; if (tiltX < -90) tiltX = -90;
            if (tiltY > 90) tiltY = 90; if (tiltY < -90) tiltY = -90;

            player.vx += tiltX * player.speed;
            player.vy += tiltY * player.speed;
        }

        // Voz aguda de chico que dice "Cazo" acelerándose
        function playNamSound(distance) {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    
                    let frase = new SpeechSynthesisUtterance("cazocazo");
                    frase.lang = 'es-ES';
                    
                    let normalizedDistance = Math.min(1, distance / 500);
                    let velocidadPronunciacion = 2 - normalizedDistance * 1.5; 
                    if (velocidadPronunciacion < 2) velocidadPronunciacion = 1.5;
                    if (velocidadPronunciacion > 2.5) velocidadPronunciacion = 1.7;
                    
                    frase.rate = velocidadPronunciacion; 
                    frase.pitch = 1.7; 
                    
                    window.speechSynthesis.speak(frase);
                }
            } catch(e) {}
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // Fricción
            player.vx *= player.friction;
            player.vy *= player.friction;
            
            // Mover bola
            player.x += player.vx;
            player.y += player.vy;

            // Límites de pantalla
            if (player.x - player.radius < 0) { player.x = player.radius; player.vx *= -0.5; }
            if (player.x + player.radius > canvas.width) { player.x = canvas.width - player.radius; player.vx *= -0.5; }
            if (player.y - player.radius < 0) { player.y = player.radius; player.vy *= -0.5; }
            if (player.y + player.radius > canvas.height) { player.y = canvas.height - player.radius; player.vy *= -0.5; }

            // Persecución
            let dx = player.x - enemy.x;
            let dy = player.y - enemy.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 0) {
                enemy.x += (dx / distance) * enemy.speed;
                enemy.y += (dy / distance) * enemy.speed;
            }

            // Sonido
            let soundDelay = Math.max(350, (distance / 500) * 1000); 
            if (timestamp - lastNamTime > soundDelay) {
                playNamSound(distance);
                lastNamTime = timestamp;
            }

            // Animación de la boca
            let normalizedDistance = Math.min(1, distance / 500);
            let animationSpeed = 0.005 + (1 - normalizedDistance) * 0.025; 
            enemy.mouthOpenness = (Math.sin(timestamp * animationSpeed) + 1) / 2;

            // Game Over
            if (distance < player.radius + enemy.radius - 10) { 
                gameRunning = false;
                gameOverScreen.style.display = 'block';
                
                try {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        let fraseGameOver = new SpeechSynthesisUtterance("¡Te comí!");
                        fraseGameOver.lang = 'es-ES';
                        fraseGameOver.rate = 1.2; 
                        fraseGameOver.pitch = 1.7; 
                        window.speechSynthesis.speak(fraseGameOver);
                    }
                } catch(e) {}
                
                return; 
            }

            // Dibujar todo
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Jugador
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00e5ff';
            ctx.fill();
            ctx.closePath();

            // Enemigo
            if (enemyImageLoaded) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.clip(); 

                ctx.drawImage(enemyImg, enemy.x - enemy.radius, enemy.y - enemy.radius, enemy.radius * 2, enemy.radius * 2);
                
                // Efecto boca
                let maxMouthArea = enemy.radius * 0.6;
                let currentMouthHeight = maxMouthArea * enemy.mouthOpenness;
                
                ctx.beginPath();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; 
                let mouthAngleStart = Math.PI * 0.45;
                let mouthAngleEnd = Math.PI * 0.55;
                let oscillatingAngle = (1 - enemy.mouthOpenness) * Math.PI * 0.4;
                
                ctx.moveTo(enemy.x, enemy.y); 
                ctx.arc(enemy.x, enemy.y, enemy.radius + 5, 
                        mouthAngleStart - oscillatingAngle, 
                        mouthAngleEnd + oscillatingAngle); 
                ctx.lineTo(enemy.x, enemy.y);
                ctx.fill();
                
                ctx.restore(); 
            } else {
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'red';
                ctx.fill();
                ctx.closePath();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
