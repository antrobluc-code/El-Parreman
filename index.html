<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parre-Man</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #222; overflow: hidden; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        canvas {
            background-color: #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: none; /* Oculto hasta que empiece el juego */
        }
        #start-screen {
            text-align: center; color: white; padding: 20px;
        }
        button {
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            background-color: #ffcc00; color: #333; border: none;
            border-radius: 10px; cursor: pointer; margin-top: 20px;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: red; font-size: 40px; font-weight: bold; text-shadow: 2px 2px black;
            display: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Parre-Man Chaser</h1>
        <p>Incliná tu móvil para mover la bolita azul.</p>
        <p>¡Huye de la cara!</p>
        <p>Asegúrate de que el sonido esté activado.</p>
        <button id="start-btn">Toca aquí para Empezar</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="game-over">¡TE COMIÓ!<br><button onclick="location.reload()">Reintentar</button></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');

        // Ajustar canvas al tamaño de la pantalla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Variables del juego
        let gameRunning = false;
        let lastNamTime = 0;
        let enemyImageLoaded = false;

        // Jugador (Bolita)
        const player = {
            x: canvas.width / 2, y: canvas.height / 2, radius: 15,
            vx: 0, vy: 0, speed: 0.1, friction: 0.95
        };

        // Enemigo (La Cara)
        const enemy = {
            x: 50, y: 50, radius: 45, speed: 2.5,
            mouthOpenness: 0 // Estado de la boca (0 cerrado, 1 abierto)
        };

        // Cargar la imagen de la cara (Asegúrate de tener la imagen 'cara.jpg' en la misma carpeta)
        const enemyImg = new Image();
        enemyImg.src = 'cara.jpg'; 
        enemyImg.onload = () => { enemyImageLoaded = true; };

        // Iniciar el juego
        startBtn.addEventListener('click', () => {
            // Activar el sintetizador de voz (requiere interacción en Android)
            if ('speechSynthesis' in window) {
                let fraseInicial = new SpeechSynthesisUtterance("¡Cuidado!");
                fraseInicial.lang = 'es-ES'; fraseInicial.rate = 1.2; fraseInicial.pitch = 1.7;
                window.speechSynthesis.speak(fraseInicial);
            }

            // Solicitar permisos de giroscopio y acelerómetro (necesario en Android/Chrome moderno)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            startGame();
                        } else {
                            alert('Se necesita acceso a los sensores para jugar.');
                        }
                    })
                    .catch(console.error);
            } else {
                // En AndroidChrome antiguo no hace falta permiso explícito
                window.addEventListener('deviceorientation', handleOrientation);
                startGame();
            }
        });

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            gameRunning = true;
            gameLoop();
        }

        // Manejar la inclinación del móvil (Acelerómetro/Giroscopio de Android)
        function handleOrientation(event) {
            if (!gameRunning) return;
            
            // gamma es la inclinación izquierda/derecha
            // beta es la inclinación adelante/atrás
            let tiltX = event.gamma;
            let tiltY = event.beta;

            // Limitar valores para que no se vuelva loco si el móvil está boca abajo
            if (tiltX > 90) tiltX = 90; if (tiltX < -90) tiltX = -90;
            if (tiltY > 90) tiltY = 90; if (tiltY < -90) tiltY = -90;

            // Aplicar la inclinación como fuerza (velocidad) a la bola
            player.vx += tiltX * player.speed;
            player.vy += tiltY * player.speed;
        }

        // Voz aguda de chico que dice "Cazo" acelerándose
        function playNamSound(distance) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Cortar lo anterior para que no se atasque
                
                let frase = new SpeechSynthesisUtterance("cazo");
                frase.lang = 'es-ES';
                
                // --- CAMBIO: Velocidad dinámica ---
                // La pronunciación es más rápida cuanto más cerca (entre velocidad 1.5 y 3)
                let normalizedDistance = Math.min(1, distance / 500);
                let velocidadPronunciacion = 3 - normalizedDistance * 1.5; 
                if (velocidadPronunciacion < 1.5) velocidadPronunciacion = 1.5;
                if (velocidadPronunciacion > 3) velocidadPronunciacion = 3;
                
                frase.rate = velocidadPronunciacion; 
                frase.pitch = 1.7; // Tono agudo (estridente/chico)
                
                window.speechSynthesis.speak(frase);
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            // --- LÓGICA DEL JUGADOR ---
            // Aplicar fricción (la bola frena sola)
            player.vx *= player.friction;
            player.vy *= player.friction;
            
            // Mover bola
            player.x += player.vx;
            player.y += player.vy;

            // Límites de la pantalla con rebote suave
            if (player.x - player.radius < 0) { player.x = player.radius; player.vx *= -0.5; }
            if (player.x + player.radius > canvas.width) { player.x = canvas.width - player.radius; player.vx *= -0.5; }
            if (player.y - player.radius < 0) { player.y = player.radius; player.vy *= -0.5; }
            if (player.y + player.radius > canvas.height) { player.y = canvas.height - player.radius; player.vy *= -0.5; }

            // --- LÓGICA DEL ENEMIGO (Persecución) ---
            let dx = player.x - enemy.x;
            let dy = player.y - enemy.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 0) {
                enemy.x += (dx / distance) * enemy.speed;
                enemy.y += (dy / distance) * enemy.speed;
            }

            // --- LÓGICA DEL SONIDO (Dinámico según distancia) ---
            // El retraso entre cada "cazo" varía entre 350ms (cerca) y 1000ms (lejos)
            let soundDelay = Math.max(350, (distance / 500) * 1000
